<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- Background -->
  <rect width="900" height="600" fill="#f8f9fa"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="72" fill="#2A2E3A"/>
  <text x="450" y="44" font-family="system-ui, sans-serif" font-size="28" font-weight="700"
        fill="white" text-anchor="middle">Static vs. Interactive vs. Adaptive Textbooks</text>

  <!-- Column 1 — Static (blue) -->
  <rect x="18" y="84" width="270" height="492" fill="#EAF4FB" rx="8"/>
  <rect x="18" y="84" width="270" height="60" fill="#1389A6" rx="8"/>
  <rect x="18" y="120" width="270" height="24" fill="#1389A6"/>
  <text x="153" y="122" font-family="system-ui, sans-serif" font-size="20" font-weight="700"
        fill="white" text-anchor="middle">Static — Level 1</text>

  <!-- Column 1 icon: document -->
  <rect x="103" y="168" width="100" height="130" fill="white" stroke="#1389A6" stroke-width="3" rx="4"/>
  <line x1="118" y1="200" x2="188" y2="200" stroke="#1389A6" stroke-width="3"/>
  <line x1="118" y1="220" x2="188" y2="220" stroke="#1389A6" stroke-width="3"/>
  <line x1="118" y1="240" x2="175" y2="240" stroke="#1389A6" stroke-width="3"/>
  <line x1="118" y1="260" x2="188" y2="260" stroke="#1389A6" stroke-width="3"/>
  <line x1="118" y1="280" x2="160" y2="280" stroke="#1389A6" stroke-width="3"/>

  <!-- Column 1 attributes -->
  <text x="153" y="330" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• Text and static images</text>
  <text x="153" y="354" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• No learner interaction</text>
  <text x="153" y="378" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• Same content for all</text>
  <text x="153" y="402" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• PDF / print format</text>
  <text x="153" y="450" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1389A6" text-anchor="middle">Passive Learning</text>

  <!-- Column 2 — Interactive (green) -->
  <rect x="315" y="84" width="270" height="492" fill="#EAF7EF" rx="8"/>
  <rect x="315" y="84" width="270" height="60" fill="#2D8A4E" rx="8"/>
  <rect x="315" y="120" width="270" height="24" fill="#2D8A4E"/>
  <text x="450" y="122" font-family="system-ui, sans-serif" font-size="20" font-weight="700"
        fill="white" text-anchor="middle">Interactive — Level 2</text>

  <!-- Column 2 icon: laptop with chart -->
  <rect x="370" y="168" width="160" height="110" fill="white" stroke="#2D8A4E" stroke-width="3" rx="4"/>
  <rect x="350" y="278" width="200" height="16" fill="white" stroke="#2D8A4E" stroke-width="2" rx="2"/>
  <!-- mini bar chart inside laptop -->
  <rect x="390" y="240" width="22" height="30" fill="#2D8A4E" rx="2"/>
  <rect x="420" y="220" width="22" height="50" fill="#1389A6" rx="2"/>
  <rect x="450" y="230" width="22" height="40" fill="#6A3FB5" rx="2"/>
  <rect x="480" y="210" width="22" height="60" fill="#E07B39" rx="2"/>

  <!-- Column 2 attributes -->
  <text x="450" y="330" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• Hyperlinked navigation</text>
  <text x="450" y="354" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• Embedded MicroSims</text>
  <text x="450" y="378" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• Inline quizzes</text>
  <text x="450" y="402" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• MkDocs Material</text>
  <text x="450" y="450" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#2D8A4E" text-anchor="middle">Active Learning</text>

  <!-- Column 3 — Adaptive (purple) -->
  <rect x="612" y="84" width="270" height="492" fill="#F0ECF9" rx="8"/>
  <rect x="612" y="84" width="270" height="60" fill="#6A3FB5" rx="8"/>
  <rect x="612" y="120" width="270" height="24" fill="#6A3FB5"/>
  <text x="747" y="122" font-family="system-ui, sans-serif" font-size="20" font-weight="700"
        fill="white" text-anchor="middle">Adaptive — Level 3+</text>

  <!-- Column 3 icon: brain/AI -->
  <ellipse cx="747" cy="220" rx="60" ry="52" fill="white" stroke="#6A3FB5" stroke-width="3"/>
  <circle cx="727" cy="210" r="8" fill="#6A3FB5"/>
  <circle cx="747" cy="198" r="8" fill="#6A3FB5"/>
  <circle cx="767" cy="210" r="8" fill="#6A3FB5"/>
  <circle cx="737" cy="228" r="8" fill="#6A3FB5"/>
  <circle cx="757" cy="228" r="8" fill="#6A3FB5"/>
  <line x1="727" y1="210" x2="747" y2="198" stroke="#6A3FB5" stroke-width="2"/>
  <line x1="747" y1="198" x2="767" y2="210" stroke="#6A3FB5" stroke-width="2"/>
  <line x1="727" y1="210" x2="737" y2="228" stroke="#6A3FB5" stroke-width="2"/>
  <line x1="767" y1="210" x2="757" y2="228" stroke="#6A3FB5" stroke-width="2"/>
  <line x1="737" y1="228" x2="757" y2="228" stroke="#6A3FB5" stroke-width="2"/>

  <!-- Column 3 attributes -->
  <text x="747" y="330" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• xAPI progress tracking</text>
  <text x="747" y="354" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• AI-generated explanations</text>
  <text x="747" y="378" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• Adaptive difficulty</text>
  <text x="747" y="402" font-family="system-ui, sans-serif" font-size="13" fill="#2A2E3A" text-anchor="middle">• Knowledge graph ordering</text>
  <text x="747" y="450" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#6A3FB5" text-anchor="middle">Personalized Learning</text>

  <!-- Bottom footer -->
  <rect x="0" y="554" width="900" height="46" fill="#2A2E3A"/>
  <text x="450" y="582" font-family="system-ui, sans-serif" font-size="13"
        fill="#aaa" text-anchor="middle">Claude Skills — Intelligent Textbook Intelligence Levels</text>
</svg>
